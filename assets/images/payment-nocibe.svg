  <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#08315f" text-anchor="middle">
    <line x1="248" y1="666" x2="1032" y2="666" stroke="#d9e0e8"/>
    <text x="326" y="696">Paiement securise</text>
    <text x="640" y="696">Confirmation rapide</text>
    <text x="956" y="696">Livraison assuree</text>
    <text x="480" y="740" font-size="34">VISA</text>
    <circle cx="596" cy="730" r="25" fill="#eb001b"/>
    <circle cx="632" cy="730" r="25" fill="#f79e1b" opacity=".92"/>
    <rect x="704" y="706" width="78" height="44" rx="6" fill="#fbbf24"/>
    <text x="743" y="735" font-size="20" fill="#0d4f8b">MTN</text>
    <rect x="812" y="706" width="78" height="44" rx="6" fill="#101010"/>
    <text x="851" y="735" font-size="20" fill="#fff">Moov</text>
