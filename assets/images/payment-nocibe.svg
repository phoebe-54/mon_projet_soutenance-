        <text x="63" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#08315f">NOCIBE</text>
        <text x="63" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#1c5e9e">CIMENT</text>
        <text x="63" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#1c5e9e">BLANC</text>
