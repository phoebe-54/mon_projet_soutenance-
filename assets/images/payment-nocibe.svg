      <rect x="18" y="20" width="34" height="28" rx="4" fill="#f5c84b"/>
      <text x="86" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" fill="#fff">**** 2458</text>
