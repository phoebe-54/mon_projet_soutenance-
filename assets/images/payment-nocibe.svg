        <rect x="96" y="78" width="64" height="54"/>
        <ellipse cx="128" cy="132" rx="32" ry="10"/>
        <ellipse cx="190" cy="100" rx="32" ry="10"/>
        <rect x="158" y="100" width="64" height="42"/>
        <ellipse cx="190" cy="142" rx="32" ry="10"/>
