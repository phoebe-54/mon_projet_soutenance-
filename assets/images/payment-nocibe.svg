      <rect x="14" y="24" width="130" height="154" rx="8" fill="#203141"/>
      <rect x="41" y="65" width="76" height="58" rx="11" fill="#ffc20a"/>
      <text x="79" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" fill="#fff">Mi</text>
      <rect x="45" y="138" width="70" height="20" rx="5" fill="url(#orange)"/>
