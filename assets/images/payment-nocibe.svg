    <text x="718" y="513" font-size="15" font-weight="800">MTN</text>
    <rect x="702" y="534" width="194" height="30" rx="4" fill="#f7f9fc" stroke="#b9c3cf"/>
    <text x="718" y="555" font-size="15" font-weight="800">+237 6 87 12 34 56</text>
    <rect x="702" y="580" width="194" height="36" rx="5" fill="url(#orange)"/>
    <text x="799" y="604" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">Valider</text>
  </g>

