    <rect x="372" y="294" width="536" height="286" rx="4" fill="#f8fbff"/>
    <circle cx="640" cy="286" r="3" fill="#5d7184"/>
    <rect x="306" y="596" width="668" height="28" rx="4" fill="#b8c1ca"/>
