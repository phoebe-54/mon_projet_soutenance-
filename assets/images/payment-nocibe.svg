<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Paiement de commande NOCIBE</title>
  <desc id="desc">Illustration de paiement en ligne avec carte bancaire, mobile money et sacs de ciment NOCIBE.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5fb"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff8a1c"/>
      <stop offset="1" stop-color="#ef5f00"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07315f"/>
      <stop offset="1" stop-color="#0d4f8b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#69c35a"/>
      <stop offset="1" stop-color="#117232"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
