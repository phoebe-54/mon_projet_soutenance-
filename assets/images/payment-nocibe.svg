    <text x="640" y="178" font-size="34" font-weight="800">Paiement de votre commande</text>
    <text x="640" y="222" font-size="25">Montant a payer : <tspan font-weight="800">152 000 CFA</tspan></text>
    <line x1="128" y1="250" x2="1152" y2="250" stroke="#d9e0e8" stroke-width="2"/>
  </g>

