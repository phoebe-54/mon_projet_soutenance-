        <rect x="0" y="42" width="126" height="132" fill="#f6f2e8"/>
        <text x="63" y="30" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#fff">NOCIBE</text>
        <text x="63" y="96" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800" fill="#ffd32a">CIMENT</text>
        <text x="63" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#fff">RUAL CE</text>
